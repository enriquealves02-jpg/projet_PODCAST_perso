name: Daily Digest

on:
  schedule:
    # 4h30 UTC = 5h30 Paris (hiver) / 6h30 Paris (ete) - mail vers 7h apres pipeline
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  daily-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Digest pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RATING_WEBHOOK_URL: ${{ secrets.RATING_WEBHOOK_URL }}
        run: python main.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          DATE=$(date +%Y-%m-%d)

          # Save digest before switching branch
          cp data/digest.html /tmp/digest.html

          # Fetch gh-pages if it exists, or create it
          git fetch origin gh-pages:gh-pages 2>/dev/null && git checkout gh-pages || git checkout --orphan gh-pages

          # Clean tracked files but keep archive/
          git rm -rf --ignore-unmatch index.html 2>/dev/null || true

          mkdir -p archive
          cp /tmp/digest.html index.html
          cp /tmp/digest.html "archive/${DATE}.html"

          git add index.html archive/
          git commit -m "Digest ${DATE}" || echo "No changes"
          git push origin gh-pages

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_number }}
          path: data/
          retention-days: 7
